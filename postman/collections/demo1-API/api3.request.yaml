$kind: http-request
name: api3
method: GET
url: '{{baseUrl}}/api3'
description: "Returns the string 'api3'"
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response body equals 'api3'", function () {
          pm.expect(pm.response.text()).to.equal("api3");
      });
